<!DOCTYPE html>
<html>
<head>
  <title>Eggy Clicker 🥚</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: white;
      text-align: center;
    }

    .hidden {
      display: none;
    }

    button {
      padding: 10px 15px;
      margin: 5px;
      font-size: 16px;
      cursor: pointer;
    }

    #egg {
      font-size: 100px;
      cursor: pointer;
      user-select: none;
    }

    .section {
      margin: 20px auto;
      max-width: 500px;
    }

    #wardrobeList div {
      background: #f4f4f4;
      border-radius: 8px;
    }

    @media (max-width: 600px) {
      #egg {
        font-size: 80px;
      }
    }
  </style>
</head>

<body>

  <!-- LOGIN SCREEN -->
  <div id="loginScreen" class="section">
    <h1>🥚 Eggy Clicker</h1>
    <input id="usernameInput" placeholder="Enter username">
    <br><br>
    <button onclick="startGame()">Start Game</button>
  </div>

  <!-- GAME SCREEN -->
  <div id="gameScreen" class="hidden">

    <h2>Welcome, <span id="playerName"></span></h2>
    <h3>Yolk: <span id="points">0</span></h3>
    <h4 id="rankDisplay">Prestige 0</h4>
    <h4 id="cpsDisplay">CPS: 0</h4>

    <div id="egg">🥚</div>

    <div class="section">
      <button onclick="buyClickUpgrade()">Upgrade Click</button>
      <button onclick="buyAutoUpgrade()">Upgrade Auto</button>
      <button onclick="buyCritUpgrade()">Upgrade Crit</button>
      <button id="prestigeBtn" onclick="prestige()">Prestige</button>
    </div>

    <div class="section">
      <button onclick="changeBackground()">Change Background</button>
      <button onclick="saveGame()">Save</button>
      <button onclick="exportGame()">Export</button>
      <button onclick="importGame()">Import</button>
      <button onclick="deleteSave()">Delete Save</button>
    </div>

    <div class="section">
      <h3>Wardrobe</h3>
      <div id="wardrobeList"></div>
    </div>

    <div class="section">
      <h3>Achievements</h3>
      <div id="achievementList"></div>
    </div>

    <div class="section">
      <button onclick="alert('Event system coming soon 🥚')">
        🎉 Events
      </button>
    </div>

  </div>

  <script src="game.js"></script>

</body>
</html>
