<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eggy Clicker</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

  <!-- HEADER -->
  <header>
    <h1>🥚 Eggy Clicker 🥚</h1>
    <div id="rankDisplay">Rank: None</div>
  </header>

  <!-- STATS -->
  <section id="stats">
    <div>Yolk: <span id="points">0</span></div>
    <div>CPS: <span id="cps">0</span></div>
  </section>

  <!-- EGG -->
  <section id="eggSection">
    <div id="egg">🥚</div>
  </section>

  <!-- SHOP -->
  <section class="panel" id="shopPanel">
    <h2>Shop</h2>
    <button id="clickUpgrade"></button>
    <button id="autoUpgrade"></button>
    <button id="critUpgrade"></button>
  </section>

  <!-- PRESTIGE -->
  <section class="panel" id="prestigePanel">
    <h2>Prestige</h2>
    <button id="prestigeBtn" class="orange"></button>
  </section>

  <!-- MAIN BUTTONS -->
  <section class="buttonRow">
    <button id="wardrobeToggle">Wardrobe</button>
    <button id="eventBtn" class="blue">Events</button>
  </section>

  <!-- WARDROBE PANEL -->
  <section class="panel hidden" id="wardrobePanel">
    <h2>Wardrobe</h2>
    <div id="wardrobeList"></div>
  </section>

  <!-- ACHIEVEMENTS -->
  <section class="panel" id="achievementPanel">
    <h2>Achievements</h2>
    <div id="achievementList"></div>
  </section>

  <!-- SAVE CONTROLS -->
  <section class="panel">
    <div class="buttonRow">
      <button id="saveBtn" class="green">Save</button>
      <button id="exportBtn">Export</button>
      <button id="importBtn">Import</button>
      <button id="deleteBtn" class="red">Delete</button>
    </div>
  </section>

</div>

<!-- JAVASCRIPT FILES (ORDER MATTERS) -->
<script src="js/core.js"></script>
<script src="js/shop.js"></script>
<script src="js/prestige.js"></script>
<script src="js/wardrobe.js"></script>
<script src="js/achievements.js"></script>
<script src="js/save.js"></script>
<script src="js/events.js"></script>

</body>
</html>
