<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eggy Clicker 🥚</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <h1>🥚 EGGY CLICKER 🥚</h1>
  <input id="usernameInput" placeholder="Enter Username">
  <br><br>
  <button onclick="startGame()">Start Game</button>
  <br><br>
  <button onclick="loadGame()">Load Save</button>
</div>

<!-- GAME SCREEN -->
<div id="gameScreen" class="hidden">

  <h2 id="playerName"></h2>
  <h3 id="rankDisplay"></h3>

  <h2>Yolk: <span id="points">0</span></h2>

  <div id="eggContainer">
    <div id="egg">🥚</div>
  </div>

  <h3>CPS: <span id="cps">0</span></h3>

  <!-- SHOP -->
  <div class="panel">
    <h3>Shop</h3>
    <button id="clickUpgrade"></button>
    <button id="autoUpgrade"></button>
    <button id="critUpgrade"></button>
    <button id="bgUpgrade"></button>
  </div>

  <!-- MAIN BUTTONS -->
  <div>
    <button id="prestigeBtn" onclick="prestige()"></button>
    <button onclick="toggleWardrobe()">Wardrobe</button>
    <button onclick="goToEvent()">Event</button>
  </div>

  <!-- WARDROBE -->
  <div id="wardrobePanel" class="hidden panel"></div>

  <!-- ACHIEVEMENTS -->
  <div class="panel">
    <h3>Achievements</h3>
    <div id="achievementList"></div>
  </div>

  <!-- SAVE -->
  <div>
    <button onclick="saveGame()">Save</button>
    <button onclick="exportGame()">Export</button>
    <button onclick="importGame()">Import</button>
    <button onclick="deleteGame()">Delete</button>
  </div>

</div>

<script src="game.js"></script>

</body>
</html>
